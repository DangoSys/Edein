services:
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edein-sandbox
    restart: unless-stopped
    ports:
      - "8090:8090"

  api:
    build:
      context: ..
      dockerfile: sandbox/api.Dockerfile
    container_name: edein-api
    restart: unless-stopped
    depends_on:
      - sandbox
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://host.docker.internal:27017}
      MONGO_DB: edein
      MONGO_TASKS_COLLECTION: tasks
      SANDBOX_BASE_URL: http://sandbox:8090
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
